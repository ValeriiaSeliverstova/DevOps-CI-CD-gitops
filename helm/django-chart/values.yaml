replicaCount: 2

image:
  repository: 143536904714.dkr.ecr.us-west-2.amazonaws.com/goit-ecr
  tag: 8-bb0087a1
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

nginx:
  replicaCount: 1
  image:
    repository: nginx
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: LoadBalancer
    port: 80
    targetPort: 80

postgres:
  image:
    repository: postgres
    tag: "14"
    pullPolicy: IfNotPresent
  service:
    port: 5432
    targetPort: 5432
  persistence:
    enabled: false
    storageClassName: gp2
    size: 1Gi

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70

config:
  POSTGRES_PORT: "5432"
  POSTGRES_USER: django_user
  POSTGRES_DB: django_db
  ALLOWED_HOSTS: "*"

secret:
  POSTGRES_PASSWORD: "postgres123"
